<section class="journey-companion-container">
  <sbb-title level="2" class="journey-companion-title-even">
    Hello {{ auth.currentUser()?.username }}!
  </sbb-title>
</section>
<section class="journey-companion-container journey-companion-game-buttons">
  <sbb-action-group>
    <sbb-button
      iconName="play-small"
      aria-label="Start a game"
      (click)="updateRoomAction('create')"
    >
    </sbb-button>
    <sbb-accent-button
      iconName="entrance-small"
      aria-label="Join a game"
      (click)="updateRoomAction('join')"
    >
    </sbb-accent-button>
    <sbb-secondary-button iconName="circle-information-small" (click)="updateRoomAction('info')">
    </sbb-secondary-button>
  </sbb-action-group>
  @if (roomAction(); as roomAction) {
    <article class="lobby-form">
      @switch (roomAction) {
        @case ('create') {
          <form>
            <sbb-title level="3" class="journey-companion-title-even">Start a game</sbb-title>
            <sbb-form-field>
              <sbb-icon slot="prefix" name="pen-small"></sbb-icon>
              <label for="create-room">Room name</label>
              <input
                id="create-room"
                type="text"
                [formControl]="name"
                placeholder="Be imaginative.."
              />
            </sbb-form-field>
          </form>
          <sbb-button iconName="user-group-small">Start</sbb-button>
        }
        @case ('join') {
          <form>
            <sbb-title level="3" class="journey-companion-title-even">Join a game</sbb-title>
            <sbb-form-field>
              <label for="join-room">Room code</label>
              <sbb-icon slot="prefix" name="pen-small"></sbb-icon>
              <input
                id="join-room"
                type="text"
                [formControl]="code"
                placeholder="Alphanumeric, 6-chars"
              />
            </sbb-form-field>
          </form>
          <sbb-accent-button iconName="entrance-small">Join</sbb-accent-button>
        }
        @case ('info') {
          <sbb-title level="3" class="journey-companion-title-even">Information</sbb-title>
          <p class="sbb-text-s">TBD</p>
        }
      }
    </article>
    <sbb-divider></sbb-divider>
  }
</section>
